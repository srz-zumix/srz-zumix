name: Draft Release
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

jobs:
  draft-release:
    uses: ./.github/workflows/reusable-draft-release.yml
    permissions:
      contents: write
    with:
      birth_year: ${{ vars.MY_BIRTH_YEAR }}
      birth_month: ${{ vars.MY_BIRTH_MONTH }}
